<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orca - Video Streaming</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active {
      color: var(--text);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem;
    }

    .view { display: none; }
    .view.active { display: block; }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    /* Upload */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }

    .upload-area p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .upload-area .browse {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }

    #upload-file { display: none; }

    .upload-progress {
      display: none;
      margin-top: 1.5rem;
    }

    .upload-progress.active { display: block; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .upload-result {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .upload-result.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--success);
    }

    .upload-result.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }

    .upload-result a {
      color: inherit;
      text-decoration: underline;
    }

    /* API Key input */
    .api-key-section {
      margin-bottom: 1.5rem;
    }

    .api-key-section label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .api-key-section input {
      width: 100%;
      max-width: 400px;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: monospace;
    }

    .api-key-section input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Video list */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }

    .video-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .video-thumb {
      aspect-ratio: 16/9;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
    }

    .video-info {
      padding: 0.75rem 1rem;
    }

    .video-info .video-id {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .video-info .video-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      gap: 0.75rem;
    }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-badge.ready { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .status-badge.processing { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .status-badge.failed { background: rgba(239, 68, 68, 0.15); color: var(--error); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state p {
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }

    /* Player */
    .player-container {
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .player-container video {
      width: 100%;
      display: block;
    }

    .player-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .player-info .video-id {
      font-family: monospace;
      font-size: 1rem;
    }

    .player-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .stream-url {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .btn-sm {
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-outline:hover {
      border-color: var(--text);
      color: var(--text);
      background: transparent;
    }

    .back-link {
      display: inline-block;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .back-link:hover { color: var(--text); }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Orca</div>
    <nav>
      <a href="#videos" class="nav-link active" data-view="videos">Videos</a>
      <a href="#upload" class="nav-link" data-view="upload">Upload</a>
    </nav>
  </header>

  <main>
    <!-- Videos list view -->
    <div id="view-videos" class="view active">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
        <h2 style="margin-bottom:0;">Videos</h2>
        <button class="refresh-btn" onclick="loadVideos()">Refresh</button>
      </div>
      <div id="video-list"></div>
    </div>

    <!-- Upload view -->
    <div id="view-upload" class="view">
      <h2>Upload Video</h2>
      <div class="api-key-section">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="Enter your API key">
      </div>
      <div class="upload-area" id="upload-area">
        <div style="font-size:2rem; margin-bottom:0.5rem;">&#x1F4C1;</div>
        <p>Drag and drop an MP4 file here, or <span class="browse">browse</span></p>
        <p style="font-size:0.8rem; margin-top:0.25rem;">Only .mp4 files are accepted</p>
        <input type="file" id="upload-file" accept="video/mp4,.mp4">
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">Uploading...</div>
      </div>
      <div class="upload-result" id="upload-result"></div>
    </div>

    <!-- Player view -->
    <div id="view-player" class="view">
      <a class="back-link" onclick="navigate('videos')">&larr; Back to videos</a>
      <div class="player-info">
        <span class="video-id" id="player-video-id"></span>
        <span class="status-badge" id="player-status"></span>
      </div>
      <div class="player-container">
        <video id="video-player" controls></video>
      </div>
      <div class="stream-url" id="stream-url"></div>
      <div class="player-actions">
        <button class="btn btn-sm btn-outline" onclick="copyStreamUrl()">Copy URL</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // State
    let currentView = 'videos';
    let pollInterval = null;
    let navGeneration = 0;

    // Navigation
    function navigate(view, params) {
      navGeneration++;
      currentView = view;

      // Cancel any active polling
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }

      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
      document.querySelectorAll('.nav-link').forEach(a => {
        a.classList.toggle('active', a.dataset.view === view);
      });

      if (view === 'videos') {
        loadVideos();
        window.location.hash = 'videos';
      } else if (view === 'upload') {
        window.location.hash = 'upload';
      } else if (view === 'player' && params && params.id) {
        window.location.hash = 'play/' + params.id;
        loadPlayer(params.id);
      }
    }

    document.querySelectorAll('.nav-link').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        navigate(a.dataset.view);
      });
    });

    // API Key persistence
    const apiKeyInput = document.getElementById('api-key');
    apiKeyInput.value = localStorage.getItem('orca_api_key') || '';
    apiKeyInput.addEventListener('input', () => {
      localStorage.setItem('orca_api_key', apiKeyInput.value);
    });

    function getApiKey() {
      return apiKeyInput.value || localStorage.getItem('orca_api_key') || '';
    }

    // Video list
    function createVideoCard(v) {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.addEventListener('click', () => navigate('player', { id: v.id }));

      const thumb = document.createElement('div');
      thumb.className = 'video-thumb';
      thumb.textContent = v.status === 'ready' ? '\u25B6' : '\u2026';
      card.appendChild(thumb);

      const info = document.createElement('div');
      info.className = 'video-info';

      const idEl = document.createElement('div');
      idEl.className = 'video-id';
      idEl.textContent = v.id;
      info.appendChild(idEl);

      const meta = document.createElement('div');
      meta.className = 'video-meta';

      const statusBadge = document.createElement('span');
      const safeStatus = ['ready', 'processing', 'failed'].includes(v.status) ? v.status : 'failed';
      statusBadge.className = 'status-badge ' + safeStatus;
      statusBadge.textContent = v.status;
      meta.appendChild(statusBadge);

      const durationEl = document.createElement('span');
      durationEl.textContent = v.duration ? formatDuration(v.duration) : '--:--';
      meta.appendChild(durationEl);

      const dateEl = document.createElement('span');
      dateEl.textContent = formatDate(v.created_at);
      meta.appendChild(dateEl);

      info.appendChild(meta);
      card.appendChild(info);
      return card;
    }

    function setEmptyState(container, message, showUploadLink) {
      container.textContent = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'empty-state';
      const p = document.createElement('p');
      p.textContent = message;
      wrapper.appendChild(p);
      if (showUploadLink) {
        const btn = document.createElement('a');
        btn.className = 'btn';
        btn.href = '#upload';
        btn.textContent = 'Upload your first video';
        btn.addEventListener('click', (e) => { e.preventDefault(); navigate('upload'); });
        wrapper.appendChild(btn);
      }
      container.appendChild(wrapper);
    }

    async function loadVideos() {
      const container = document.getElementById('video-list');
      try {
        const res = await fetch('/api/videos', {
          headers: { 'X-API-Key': getApiKey() }
        });
        if (!res.ok) {
          setEmptyState(container, 'Failed to load videos. Check your API key.', false);
          return;
        }
        const data = await res.json();
        const videos = data.videos || [];

        if (videos.length === 0) {
          setEmptyState(container, 'No videos yet.', true);
          return;
        }

        container.textContent = '';
        const grid = document.createElement('div');
        grid.className = 'video-grid';
        videos.forEach(v => grid.appendChild(createVideoCard(v)));
        container.appendChild(grid);
      } catch (err) {
        setEmptyState(container, 'Cannot connect to server.', false);
      }
    }

    // Upload
    const uploadArea = document.getElementById('upload-area');
    const uploadFile = document.getElementById('upload-file');
    const uploadProgress = document.getElementById('upload-progress');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const uploadResult = document.getElementById('upload-result');

    uploadArea.addEventListener('click', () => uploadFile.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    uploadFile.addEventListener('change', () => {
      if (uploadFile.files.length > 0) {
        handleFile(uploadFile.files[0]);
      }
    });

    function handleFile(file) {
      if (!file.name.toLowerCase().endsWith('.mp4')) {
        showResult('error', 'Only MP4 files are accepted.');
        return;
      }

      const apiKey = getApiKey();
      if (!apiKey) {
        showResult('error', 'Please enter your API key first.');
        return;
      }

      uploadResult.className = 'upload-result';
      uploadResult.style.display = 'none';
      uploadProgress.classList.add('active');
      progressFill.style.width = '0%';
      progressText.textContent = 'Uploading ' + file.name + '...';

      const formData = new FormData();
      formData.append('video', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.setRequestHeader('X-API-Key', apiKey);

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = 'Uploading ' + file.name + '... ' + pct + '%';
        }
      });

      xhr.addEventListener('load', () => {
        uploadProgress.classList.remove('active');
        if (xhr.status === 202) {
          const data = JSON.parse(xhr.responseText);
          showUploadSuccess(data.id);
          uploadFile.value = '';
        } else {
          let msg = 'Upload failed.';
          try { msg = JSON.parse(xhr.responseText).error || msg; } catch(e) {}
          showResult('error', msg);
        }
      });

      xhr.addEventListener('error', () => {
        uploadProgress.classList.remove('active');
        showResult('error', 'Network error. Is the server running?');
      });

      xhr.send(formData);
    }

    function showResult(type, message) {
      uploadResult.className = 'upload-result ' + type;
      uploadResult.textContent = message;
    }

    function showUploadSuccess(videoId) {
      uploadResult.className = 'upload-result success';
      uploadResult.textContent = '';

      const text = document.createTextNode('Video uploaded! ID: ');
      uploadResult.appendChild(text);

      const strong = document.createElement('strong');
      strong.textContent = videoId;
      uploadResult.appendChild(strong);

      uploadResult.appendChild(document.createTextNode(' \u2014 '));

      const watchLink = document.createElement('a');
      watchLink.href = '#play/' + encodeURIComponent(videoId);
      watchLink.textContent = 'Watch';
      watchLink.addEventListener('click', (e) => {
        e.preventDefault();
        navigate('player', { id: videoId });
      });
      uploadResult.appendChild(watchLink);

      uploadResult.appendChild(document.createTextNode(' | Status: processing...'));
    }

    // Player
    let hls = null;

    function loadPlayer(id) {
      const videoEl = document.getElementById('video-player');
      const videoIdEl = document.getElementById('player-video-id');

      videoIdEl.textContent = id;

      // Clean up previous player
      if (hls) {
        hls.destroy();
        hls = null;
      }
      videoEl.removeAttribute('src');

      checkAndPlay(id, navGeneration);
    }

    async function checkAndPlay(id, generation) {
      const videoEl = document.getElementById('video-player');
      const statusEl = document.getElementById('player-status');
      const urlEl = document.getElementById('stream-url');

      // Abort if user navigated away
      if (generation !== navGeneration) return;

      try {
        const res = await fetch('/api/status/' + encodeURIComponent(id), {
          headers: { 'X-API-Key': getApiKey() }
        });

        if (generation !== navGeneration) return;

        if (!res.ok) {
          statusEl.textContent = 'not found';
          statusEl.className = 'status-badge failed';
          return;
        }
        const video = await res.json();
        const safeStatus = ['ready', 'processing', 'failed'].includes(video.status) ? video.status : 'failed';
        statusEl.textContent = video.status;
        statusEl.className = 'status-badge ' + safeStatus;

        if (video.status === 'ready') {
          const streamUrl = window.location.origin + '/stream/' + encodeURIComponent(id) + '/index.m3u8';
          urlEl.textContent = streamUrl;
          startPlayer(videoEl, streamUrl);
        } else if (video.status === 'processing') {
          urlEl.textContent = 'Processing... will auto-play when ready.';
          pollInterval = setInterval(async () => {
            if (generation !== navGeneration) {
              clearInterval(pollInterval);
              pollInterval = null;
              return;
            }
            const r = await fetch('/api/status/' + encodeURIComponent(id), {
              headers: { 'X-API-Key': getApiKey() }
            });
            if (generation !== navGeneration) {
              clearInterval(pollInterval);
              pollInterval = null;
              return;
            }
            if (r.ok) {
              const v = await r.json();
              const ss = ['ready', 'processing', 'failed'].includes(v.status) ? v.status : 'failed';
              statusEl.textContent = v.status;
              statusEl.className = 'status-badge ' + ss;
              if (v.status === 'ready') {
                clearInterval(pollInterval);
                pollInterval = null;
                const sUrl = window.location.origin + '/stream/' + encodeURIComponent(id) + '/index.m3u8';
                urlEl.textContent = sUrl;
                startPlayer(videoEl, sUrl);
              } else if (v.status === 'failed') {
                clearInterval(pollInterval);
                pollInterval = null;
                urlEl.textContent = 'Processing failed: ' + (v.error || 'unknown error');
              }
            }
          }, 2000);
        } else {
          urlEl.textContent = 'Processing failed: ' + (video.error || 'unknown error');
        }
      } catch (err) {
        if (generation !== navGeneration) return;
        statusEl.textContent = 'error';
        statusEl.className = 'status-badge failed';
        urlEl.textContent = 'Cannot connect to server.';
      }
    }

    function startPlayer(videoEl, url) {
      if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(videoEl);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          videoEl.play().catch(() => {});
        });
      } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari native HLS
        videoEl.src = url;
        videoEl.addEventListener('loadedmetadata', () => {
          videoEl.play().catch(() => {});
        }, { once: true });
      }
    }

    function copyStreamUrl() {
      const url = document.getElementById('stream-url').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.player-actions .btn-outline');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy URL'; }, 1500);
      });
    }

    // Utilities
    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function formatDate(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Router
    function handleRoute() {
      const hash = window.location.hash.slice(1) || 'videos';
      if (hash.startsWith('play/')) {
        const id = hash.slice(5);
        navigate('player', { id: id });
      } else if (hash === 'upload') {
        navigate('upload');
      } else {
        navigate('videos');
      }
    }

    window.addEventListener('hashchange', handleRoute);
    handleRoute();
  </script>
</body>
</html>
