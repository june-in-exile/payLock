<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orca - Video Streaming</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-hover: #1f1f1f;
      --border: #222222;
      --text: #ffffff;
      --text-muted: #888888;
      --accent: #3898ff;
      --accent-hover: #217ff0;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, Helvetica, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-text { color: #fff; }

    .logo-box {
      background: var(--accent);
      color: #000;
      padding: 0.1rem 0.4rem;
      border-radius: 6px;
      margin-left: 3px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem;
    }

    .view { display: none; }
    .view.active { display: block; }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    /* Upload Overlay */
    .upload-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 17, 23, 0.8);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border: 3px dashed var(--accent);
      margin: 1rem;
      border-radius: 20px;
      pointer-events: none;
    }

    .upload-overlay.active {
      display: flex;
    }

    .upload-overlay-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* Video list */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem 1rem;
    }

    .video-card {
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: visible;
    }

    .video-card:hover .video-thumb {
      border-color: var(--accent);
    }

    .video-thumb {
      aspect-ratio: 16/9;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
      transition: border-color 0.2s;
      border: 1px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    .video-info {
      padding: 0.25rem 0;
    }

    .video-info .video-id {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.25rem;
      transition: color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-info .video-id:hover {
      color: var(--accent);
    }

    .video-info .video-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      align-items: center;
    }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-badge.ready { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .status-badge.processing { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .status-badge.failed { background: rgba(239, 68, 68, 0.15); color: var(--error); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state p {
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.25rem;
      background: #151515;
      color: #ffffff;
      border: 2px solid var(--accent);
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #222222;
      border-color: var(--accent-hover);
    }

    .btn-sm {
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
      border-width: 2px;
    }

    .btn-outline {
      background: #151515;
      border: 2px solid #444444;
      color: #ffffff;
    }

    .btn-outline:hover {
      border-color: #666666;
      background: #222222;
    }

    .btn-danger {
      background: #151515;
      border: 2px solid #552222;
      color: #ff5555;
    }

    .btn-danger:hover {
      background: #221111;
      border-color: #ff3333;
      color: #ffffff;
    }

    /* Staged file preview */
    .staged-file {
      display: none;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .staged-file.active {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .staged-file-preview {
      width: 160px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .staged-file-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .staged-file-info {
      flex: 1;
      min-width: 0;
    }

    .staged-file-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .staged-file-size {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .staged-file-actions {
      display: flex;
      gap: 0.5rem;
    }

    .video-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 0;
      margin-top: 0.25rem;
      border-top: none;
    }

    /* Player */
    .player-container {
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .player-container video {
      width: 100%;
      display: block;
    }

    .player-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .player-info .video-id {
      font-family: monospace;
      font-size: 1rem;
    }

    .player-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .stream-url {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .back-link {
      display: inline-block;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .back-link:hover { color: var(--text); }

    .price-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: monospace;
    }

    .price-badge.paid { background: rgba(56, 152, 255, 0.15); color: var(--accent); }
    .price-badge.free { background: rgba(255, 255, 255, 0.08); color: var(--text-muted); }

    .paywall-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 10;
    }

    .paywall-overlay .paywall-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .paywall-overlay .paywall-label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* Wallet */
    .wallet-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .wallet-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .wallet-btn.connect {
      background: #151515;
      border: 2px solid var(--accent);
      color: #ffffff;
    }

    .wallet-btn.connect:hover {
      background: #222222;
      border-color: var(--accent-hover);
    }

    .wallet-btn.connected {
      background: #111111;
      border: 2px solid #333333;
      color: #aaaaaa;
      position: relative;
    }

    .wallet-btn.connected:hover {
      background: #151515;
      border-color: #555555;
      color: #ffffff;
    }

    .wallet-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .wallet-balance {
      font-family: monospace;
      color: var(--text);
      font-weight: 500;
    }

    .wallet-addr {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .wallet-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
    }

  </style>
</head>
<body>
  <header>
    <div class="logo" onclick="navigate('videos')"><span class="logo-text">Or</span><span class="logo-box">ca</span></div>
    <div class="wallet-area">
      <div id="wallet-status" class="wallet-info" style="display:none;">
        <span class="wallet-dot"></span>
        <span class="wallet-balance" id="wallet-balance">0 SUI</span>
        <span class="wallet-addr" id="wallet-addr"></span>
      </div>
      <button class="wallet-btn connect" id="wallet-btn" onclick="window.walletConnect()">
        Connect Wallet
      </button>
    </div>
  </header>

  <div class="upload-overlay" id="upload-overlay">
    <div class="upload-overlay-text">Drop MP4 to select</div>
  </div>

  <main>
    <!-- Videos list view -->
    <div id="view-videos" class="view active">
      <div class="upload-progress" id="upload-progress" style="display:none;">
        <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">Uploading...</div>
      </div>
      <div class="upload-result" id="upload-result"></div>

      <div style="margin-bottom: 1.5rem; padding: 1.25rem; background: var(--surface); border-radius: 8px;">
        <label for="video-title" style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Video Title (optional)</label>
        <input type="text" id="video-title" placeholder="Enter video title" style="width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; margin-bottom: 0.75rem;">

        <label for="video-price" style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Price in SUI (0 = free)</label>
        <input type="number" id="video-price" placeholder="0" min="0" step="0.01" style="width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; margin-bottom: 1rem;">

        <div class="staged-file" id="staged-file">
          <div class="staged-file-preview">
            <video id="staged-preview" muted></video>
          </div>
          <div class="staged-file-info">
            <div class="staged-file-name" id="staged-file-name"></div>
            <div class="staged-file-size" id="staged-file-size"></div>
            <div class="staged-file-actions">
              <button class="btn btn-outline" onclick="document.getElementById('upload-file').click()">Change File</button>
              <button class="btn btn-outline" onclick="cancelStaged()">Remove</button>
            </div>
          </div>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between;">
          <h2 style="margin-bottom:0;">Videos</h2>
          <div style="display:flex; gap:0.75rem; align-items:center;">
            <button class="btn" id="upload-action-btn" onclick="handleUploadAction()">Select MP4</button>
            <input type="file" id="upload-file" accept="video/mp4,.mp4" style="display:none;">
          </div>
        </div>
      </div>
      <div id="video-list"></div>
    </div>

    <!-- Player view -->
    <div id="view-player" class="view">
      <a class="back-link" onclick="navigate('videos')">&larr; Back to videos</a>
      <div class="player-info">
        <div style="display:flex; flex-direction:column;">
          <span class="video-title" id="player-video-title" style="font-size:1.25rem; font-weight:600; margin-bottom:0.25rem;"></span>
          <span class="video-id" id="player-video-id" style="font-size:0.8rem; color:var(--text-muted); font-family:monospace;"></span>
        </div>
        <span class="status-badge" id="player-status"></span>
      </div>
      <div class="player-container" style="position: relative;">
        <video id="video-player" controls></video>
        <div class="paywall-overlay" id="paywall-overlay" style="display: none;">
          <div class="paywall-label">Preview ended</div>
          <div class="paywall-price" id="paywall-price"></div>
          <button class="btn" id="paywall-unlock-btn" onclick="purchaseAndPlay()">Purchase & Unlock</button>
          <div class="paywall-label" id="paywall-hint" style="font-size: 0.75rem; margin-top: 0.5rem;"></div>
        </div>
        <div id="chain-status" style="display:none; margin-top: 0.75rem; padding: 0.75rem 1rem; background: var(--surface); border-radius: 8px; font-size: 0.85rem;">
        </div>
      </div>
      <div class="stream-url" id="stream-url"></div>
      <div class="player-actions">
        <button class="btn btn-sm btn-outline" onclick="copyStreamUrl()">Copy URL</button>
        <button class="btn btn-sm btn-danger" id="player-delete-btn" onclick="deleteFromPlayer()">Delete</button>
      </div>
    </div>
  </main>

  <script type="module">
    // --- Slush Wallet Integration ---
    const SUI_NETWORK = 'sui:testnet';

    let connectedWallet = null;
    let connectedAccount = null;
    let suiClient = null;
    let discoveredWallets = [];
    let unsubscribeWalletEvents = null;
    let Transaction = null;
    let signAndExecuteTransaction = null;
    let paywallPackageId = null;
    let sealClient = null;
    let SealClientClass = null;
    let SessionKeyClass = null;
    let EncryptedObjectClass = null;
    let fromHex = null;
    let toHex = null;
    let walrusPublisherUrl = null;
    let walrusAggregatorUrl = null;
    let walrusEpochs = 5;

    function findSlushWallet() {
      return discoveredWallets.find(w => w.name.toLowerCase().includes('slush'));
    }

    async function fetchAppConfig() {
      try {
        const res = await fetch('/api/config');
        if (res.ok) {
          const cfg = await res.json();
          paywallPackageId = cfg.paywall_package_id || null;
          return cfg;
        }
      } catch (_) {}
      return {};
    }

    async function initWallet() {
      try {
        const [slushMod, walletMod, suiMod, txMod, walletStdMod, sealMod, utilsMod, configResult] = await Promise.all([
          import('https://esm.sh/@mysten/slush-wallet@1.0.3?bundle'),
          import('https://esm.sh/@wallet-standard/app@1.1.0?bundle'),
          import('https://esm.sh/@mysten/sui@1.21.1/client?bundle'),
          import('https://esm.sh/@mysten/sui@1.21.1/transactions?bundle'),
          import('https://esm.sh/@mysten/wallet-standard@0.20.1?bundle'),
          import('https://esm.sh/@mysten/seal@1.1.1?bundle'),
          import('https://esm.sh/@mysten/sui@1.21.1/utils?bundle'),
          fetchAppConfig(),
        ]);

        const { registerSlushWallet } = slushMod;
        const { getWallets } = walletMod;
        const { SuiClient, getFullnodeUrl } = suiMod;
        Transaction = txMod.Transaction;
        signAndExecuteTransaction = walletStdMod.signAndExecuteTransaction;

        suiClient = new SuiClient({ url: getFullnodeUrl('testnet') });

        // Seal SDK setup
        SealClientClass = sealMod.SealClient;
        SessionKeyClass = sealMod.SessionKey;
        EncryptedObjectClass = sealMod.EncryptedObject;
        fromHex = utilsMod.fromHex;
        toHex = utilsMod.toHex;
        walrusPublisherUrl = configResult.walrus_publisher_url || '';
        walrusAggregatorUrl = configResult.walrus_aggregator_url || '';

        sealClient = new SealClientClass({
          suiClient,
          serverConfigs: [
            {
              objectId: '0x73d05d62c18d9374e3ea529e8e0ed6161da1a141a94d3f76ae3fe4e99356db75',
              weight: 1,
            },
            {
              objectId: '0xf5d14a81a982144ae441cd7d64b09027f116a468bd36e7eca494f750591623c8',
              weight: 1,
            },
          ],
          verifyKeyServers: false,
        });

        window._walletStandard = { getWallets, SuiClient, getFullnodeUrl, suiClient };

        const { get, on } = getWallets();
        discoveredWallets = [...get()];

        const unsubRegister = on('register', (...newWallets) => {
          for (const w of newWallets) {
            if (!discoveredWallets.some(existing => existing.name === w.name)) {
              discoveredWallets.push(w);
            }
          }
          const savedAddr = sessionStorage.getItem('orca_wallet_addr');
          if (savedAddr && !connectedWallet && findSlushWallet()) {
            autoReconnect();
          }
        });

        const unsubUnregister = on('unregister', (...removed) => {
          for (const w of removed) {
            discoveredWallets = discoveredWallets.filter(existing => existing.name !== w.name);
          }
        });

        unsubscribeWalletEvents = () => { unsubRegister(); unsubUnregister(); };

        registerSlushWallet('Orca Video Streaming', {
          origin: 'https://my.slush.app',
        });

        const savedAddr = sessionStorage.getItem('orca_wallet_addr');
        if (savedAddr && findSlushWallet()) {
          await autoReconnect();
        }
      } catch (err) {
        console.error('Wallet init failed:', err);
        const btn = document.getElementById('wallet-btn');
        btn.textContent = 'Wallet Unavailable';
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
      }
    }

    async function autoReconnect() {
      try {
        const slush = findSlushWallet();
        if (!slush) return;
        const connectFeature = slush.features['standard:connect'];
        const result = await connectFeature.connect({ silent: true });
        if (result.accounts && result.accounts.length > 0) {
          connectedWallet = slush;
          connectedAccount = result.accounts[0];
          await updateWalletUI();
          // Re-check AccessPass for current video after auto-reconnect
          if (typeof recheckAccessAfterConnect === 'function') recheckAccessAfterConnect();
        }
      } catch (_) {
        sessionStorage.removeItem('orca_wallet_addr');
      }
    }

    async function connectWallet() {
      if (connectedWallet) {
        await disconnectWallet();
        return;
      }

      try {
        const slush = findSlushWallet();
        if (!slush) {
          window.open('https://my.slush.app', '_blank');
          return;
        }

        const connectFeature = slush.features['standard:connect'];
        const result = await connectFeature.connect();

        if (result.accounts.length > 0) {
          connectedWallet = slush;
          connectedAccount = result.accounts[0];
          sessionStorage.setItem('orca_wallet_addr', connectedAccount.address);
          await updateWalletUI();
          // Re-check AccessPass for current video after wallet connects
          if (typeof recheckAccessAfterConnect === 'function') recheckAccessAfterConnect();
        }
      } catch (err) {
        const btn = document.getElementById('wallet-btn');
        btn.textContent = 'Connection Failed';
        setTimeout(() => { btn.textContent = 'Connect Wallet'; }, 2000);
      }
    }

    async function disconnectWallet() {
      if (connectedWallet) {
        try {
          const disconnectFeature = connectedWallet.features['standard:disconnect'];
          if (disconnectFeature) {
            await disconnectFeature.disconnect();
          }
        } catch (_) {}
      }
      connectedWallet = null;
      connectedAccount = null;
      sessionStorage.removeItem('orca_wallet_addr');

      const btn = document.getElementById('wallet-btn');
      btn.textContent = 'Connect Wallet';
      btn.className = 'wallet-btn connect';
      document.getElementById('wallet-status').style.display = 'none';
    }

    async function updateWalletUI() {
      const btn = document.getElementById('wallet-btn');
      const statusEl = document.getElementById('wallet-status');
      const balanceEl = document.getElementById('wallet-balance');
      const addrEl = document.getElementById('wallet-addr');

      if (!connectedAccount) return;

      const addr = connectedAccount.address;
      const shortAddr = addr.slice(0, 6) + '...' + addr.slice(-4);

      btn.textContent = 'Disconnect';
      btn.className = 'wallet-btn connected';

      addrEl.textContent = shortAddr;
      statusEl.style.display = 'flex';

      try {
        const balance = await suiClient.getBalance({ owner: addr });
        const suiAmount = (Number(balance.totalBalance) / 1_000_000_000).toFixed(4);
        balanceEl.textContent = suiAmount + ' SUI';
      } catch (_) {
        balanceEl.textContent = '-- SUI';
      }
    }

    async function createVideoOnChain(videoId, price, previewBlobId, fullBlobId) {
      if (!connectedWallet || !connectedAccount) {
        throw new Error('Wallet not connected');
      }
      if (!paywallPackageId) {
        throw new Error('Paywall contract not configured');
      }
      if (!Transaction || !signAndExecuteTransaction) {
        throw new Error('Sui SDK not loaded');
      }

      if (!/^0x[0-9a-fA-F]{64}$/.test(paywallPackageId)) {
        throw new Error('Invalid paywall package ID format');
      }

      const tx = new Transaction();
      tx.moveCall({
        target: paywallPackageId + '::paywall::create_video',
        arguments: [
          tx.pure.u64(price),
          tx.pure.string(previewBlobId),
          tx.pure.string(fullBlobId),
        ],
      });

      const result = await signAndExecuteTransaction(connectedWallet, {
        transaction: tx,
        account: connectedAccount,
        chain: SUI_NETWORK,
      });

      const txResponse = await suiClient.waitForTransaction({
        digest: result.digest,
        options: { showObjectChanges: true },
      });

      const videoType = paywallPackageId + '::paywall::Video';
      const created = (txResponse.objectChanges || []).find(
        c => c.type === 'created' && c.objectType === videoType
      );

      if (!created) {
        throw new Error('Video object not found in transaction result');
      }

      const suiObjectId = created.objectId;

      const res = await fetch('/api/videos/' + encodeURIComponent(videoId) + '/sui-object', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sui_object_id: suiObjectId }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error('Failed to save Sui object ID: ' + (body.error || res.status));
      }

      return suiObjectId;
    }

    // --- Seal Encryption & Decryption ---

    // Encrypt full video with Seal and publish to Walrus + on-chain
    async function encryptAndPublish(videoId, fileData, price, previewBlobId) {
      if (!connectedWallet || !connectedAccount) throw new Error('Wallet not connected');
      if (!sealClient || !fromHex || !toHex) throw new Error('Seal SDK not loaded');

      // Step 1: Create Video on-chain with empty full_blob_id
      const suiObjectId = await createVideoOnChain(videoId, price, previewBlobId, '');

      // Step 2: Encrypt with Seal using Video object ID as namespace
      const nonce = crypto.getRandomValues(new Uint8Array(5));
      const policyObjectBytes = fromHex(suiObjectId.replace(/^0x/, ''));
      const id = toHex(new Uint8Array([...policyObjectBytes, ...nonce]));

      const { encryptedObject: encryptedBytes } = await sealClient.encrypt({
        threshold: 1,
        packageId: paywallPackageId,
        id,
        data: new Uint8Array(fileData),
      });

      // Step 3: Upload encrypted blob to Walrus
      const walrusRes = await fetch(walrusPublisherUrl + '/v1/blobs?epochs=' + walrusEpochs, {
        method: 'PUT',
        body: encryptedBytes,
      });
      if (!walrusRes.ok) throw new Error('Walrus upload failed: ' + walrusRes.status);
      const walrusData = await walrusRes.json();
      const fullBlobId = (walrusData.newlyCreated && walrusData.newlyCreated.blobObject && walrusData.newlyCreated.blobObject.blobId)
        || (walrusData.alreadyCertified && walrusData.alreadyCertified.blobId);
      if (!fullBlobId) throw new Error('Failed to get blob ID from Walrus response');

      // Step 4: Update Video on-chain with actual full_blob_id
      const updateTx = new Transaction();
      updateTx.moveCall({
        target: paywallPackageId + '::paywall::update_full_blob_id',
        arguments: [
          updateTx.object(suiObjectId),
          updateTx.pure.string(fullBlobId),
        ],
      });
      await signAndExecuteTransaction(connectedWallet, {
        transaction: updateTx,
        account: connectedAccount,
        chain: SUI_NETWORK,
      });

      // Step 5: Update backend with full blob ID
      const backendRes = await fetch('/api/videos/' + encodeURIComponent(videoId) + '/full-blob', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_blob_id: fullBlobId }),
      });
      if (!backendRes.ok) throw new Error('Failed to update backend with full blob ID');

      return { suiObjectId, fullBlobId };
    }

    // Find AccessPass owned by current wallet for a given video (follows pagination)
    async function findAccessPass(videoSuiObjectId) {
      if (!connectedAccount || !paywallPackageId) return null;
      const accessPassType = paywallPackageId + '::paywall::AccessPass';
      let cursor = null;
      let hasNext = true;
      while (hasNext) {
        const result = await suiClient.getOwnedObjects({
          owner: connectedAccount.address,
          filter: { StructType: accessPassType },
          options: { showContent: true },
          cursor,
        });
        for (const obj of result.data) {
          if (obj.data && obj.data.content && obj.data.content.fields) {
            if (obj.data.content.fields.video_id === videoSuiObjectId) {
              return obj.data.objectId;
            }
          }
        }
        hasNext = result.hasNextPage;
        cursor = result.nextCursor;
      }
      return null;
    }

    // Purchase a video and mint AccessPass
    async function purchaseVideo(video) {
      if (!connectedWallet || !connectedAccount) throw new Error('Wallet not connected');
      if (!video.sui_object_id) throw new Error('Video not published on-chain');

      const tx = new Transaction();
      const [coin] = tx.splitCoins(tx.gas, [video.price]);
      tx.moveCall({
        target: paywallPackageId + '::paywall::purchase_and_transfer',
        arguments: [
          tx.object(video.sui_object_id),
          coin,
        ],
      });

      const result = await signAndExecuteTransaction(connectedWallet, {
        transaction: tx,
        account: connectedAccount,
        chain: SUI_NETWORK,
      });

      await suiClient.waitForTransaction({ digest: result.digest });
    }

    // Decrypt and play encrypted full video
    async function decryptAndPlay(video) {
      if (!connectedWallet || !connectedAccount) throw new Error('Wallet not connected');
      if (!sealClient || !SessionKeyClass || !EncryptedObjectClass) throw new Error('Seal SDK not loaded');

      const videoEl = document.getElementById('video-player');
      const paywallEl = document.getElementById('paywall-overlay');
      const hintEl = document.getElementById('paywall-hint');

      if (hintEl) hintEl.textContent = 'Decrypting video...';

      // 1. Create SessionKey
      const sessionKey = await SessionKeyClass.create({
        address: connectedAccount.address,
        packageId: paywallPackageId,
        ttlMin: 10,
        suiClient,
      });

      // 2. Sign personal message via wallet
      const message = sessionKey.getPersonalMessage();
      const signFeature = connectedWallet.features['sui:signPersonalMessage'];
      if (!signFeature) throw new Error('Wallet does not support signPersonalMessage');
      const signResult = await signFeature.signPersonalMessage({
        message,
        account: connectedAccount,
      });
      sessionKey.setPersonalMessageSignature(signResult.signature);

      // 3. Fetch encrypted blob from Walrus
      const encryptedRes = await fetch(video.full_blob_url);
      if (!encryptedRes.ok) throw new Error('Failed to fetch encrypted blob (HTTP ' + encryptedRes.status + ')');
      const encryptedData = new Uint8Array(await encryptedRes.arrayBuffer());
      // Guard: Walrus may return JSON error with HTTP 200 — first byte 0x7B = '{'
      if (encryptedData.length > 0 && encryptedData[0] === 0x7B) {
        const text = new TextDecoder().decode(encryptedData);
        throw new Error('Walrus returned an error instead of encrypted data: ' + text.slice(0, 200));
      }

      // 4. Parse encrypted object to get the seal ID
      const parsedEncrypted = EncryptedObjectClass.parse(encryptedData);
      const sealId = parsedEncrypted.id;

      // 5. Find user's AccessPass
      const accessPassId = await findAccessPass(video.sui_object_id);
      if (!accessPassId) throw new Error('No AccessPass found for this video');

      // 6. Build seal_approve transaction
      const tx = new Transaction();
      tx.moveCall({
        target: paywallPackageId + '::paywall::seal_approve',
        arguments: [
          tx.pure.vector('u8', Array.from(fromHex(toHex(sealId)))),
          tx.object(accessPassId),
          tx.object(video.sui_object_id),
        ],
      });
      const txBytes = await tx.build({ client: suiClient, onlyTransactionKind: true });

      // 7. Decrypt
      const decryptedBytes = await sealClient.decrypt({
        data: encryptedData,
        sessionKey,
        txBytes,
      });

      // 8. Create blob URL and play (revoke previous to avoid memory leak)
      if (videoEl.src && videoEl.src.startsWith('blob:')) {
        URL.revokeObjectURL(videoEl.src);
      }
      const blob = new Blob([decryptedBytes], { type: 'video/mp4' });
      const blobUrl = URL.createObjectURL(blob);
      videoEl.onended = null;
      paywallEl.style.display = 'none';
      videoEl.src = blobUrl;
      videoEl.play().catch(() => {});
    }

    window.walletConnect = connectWallet;
    window.isWalletConnected = () => !!connectedAccount;
    window.getWalletAddress = () => connectedAccount ? connectedAccount.address : null;
    window.createVideoOnChain = createVideoOnChain;
    window.getPaywallPackageId = () => paywallPackageId;
    window.encryptAndPublish = encryptAndPublish;
    window.findAccessPass = findAccessPass;
    window.purchaseVideo = purchaseVideo;
    window.decryptAndPlay = decryptAndPlay;

    initWallet();
  </script>
  <script>
    // State
    let currentView = 'videos';
    let pollInterval = null;
    let navGeneration = 0;

    // Navigation
    function navigate(view, params, push = true) {
      navGeneration++;
      currentView = view;

      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }

      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const viewEl = document.getElementById('view-' + view);
      if (viewEl) viewEl.classList.add('active');

      if (view === 'videos') {
        loadVideos();
        if (push) history.pushState({view}, '', '/');
      } else if (view === 'player' && params && params.id) {
        if (push) history.pushState({view, id: params.id}, '', '/play/' + params.id);
        loadPlayer(params.id);
      }
    }

    // Video list
    function createVideoCard(v) {
      const card = document.createElement('div');
      card.className = 'video-card';

      const thumb = document.createElement('div');
      thumb.className = 'video-thumb';
      thumb.textContent = v.status === 'ready' ? '\u25B6' : '\u2026';
      thumb.addEventListener('click', () => navigate('player', { id: v.id }));
      thumb.style.cursor = 'pointer';
      card.appendChild(thumb);

      const info = document.createElement('div');
      info.className = 'video-info';

      const titleEl = document.createElement('div');
      titleEl.className = 'video-id';
      titleEl.textContent = v.title || v.id;
      titleEl.style.cursor = 'pointer';
      titleEl.addEventListener('click', () => navigate('player', { id: v.id }));
      info.appendChild(titleEl);

      const meta = document.createElement('div');
      meta.className = 'video-meta';

      const idEl = document.createElement('span');
      idEl.textContent = 'ID: ' + v.id.slice(0, 8);
      idEl.style.fontFamily = 'monospace';
      meta.appendChild(idEl);

      const statusBadge = document.createElement('span');
      const safeStatus = ['ready', 'processing', 'failed'].includes(v.status) ? v.status : 'failed';
      statusBadge.className = 'status-badge ' + safeStatus;
      statusBadge.textContent = v.status;
      meta.appendChild(statusBadge);

      const priceBadge = document.createElement('span');
      if (v.price > 0) {
        priceBadge.className = 'price-badge paid';
        priceBadge.textContent = (v.price / 1_000_000_000).toFixed(2) + ' SUI';
      } else {
        priceBadge.className = 'price-badge free';
        priceBadge.textContent = 'Free';
      }
      meta.appendChild(priceBadge);

      const dateEl = document.createElement('span');
      dateEl.textContent = formatDate(v.created_at);
      meta.appendChild(dateEl);

      info.appendChild(meta);
      card.appendChild(info);

      const actions = document.createElement('div');
      actions.className = 'video-actions';

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn btn-sm btn-danger';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteVideo(v.id);
      });
      actions.appendChild(deleteBtn);

      card.appendChild(actions);

      return card;
    }

    function setEmptyState(container, message) {
      container.textContent = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'empty-state';
      const p = document.createElement('p');
      p.textContent = message;
      wrapper.appendChild(p);
      container.appendChild(wrapper);
    }

    async function deleteVideo(id) {
      if (!confirm('Are you sure you want to delete this video? This action cannot be undone.')) {
        return;
      }
      try {
        const res = await fetch('/api/videos/' + encodeURIComponent(id), {
          method: 'DELETE',
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || 'Failed to delete video.');
          return;
        }
        navigate('videos');
      } catch (err) {
        alert('Failed to delete video: ' + err.message);
      }
    }

    async function loadVideos() {
      const container = document.getElementById('video-list');
      try {
        const res = await fetch('/api/videos');
        if (!res.ok) {
          setEmptyState(container, 'Failed to load videos.');
          return;
        }
        const data = await res.json();
        const videos = data.videos || [];

        if (videos.length === 0) {
          setEmptyState(container, 'No videos yet. Drag and drop a file or click Select MP4.');
          return;
        }

        container.textContent = '';
        const grid = document.createElement('div');
        grid.className = 'video-grid';
        videos.forEach(v => grid.appendChild(createVideoCard(v)));
        container.appendChild(grid);
      } catch (err) {
        setEmptyState(container, 'Cannot connect to server.');
      }
    }

    // Upload
    const uploadOverlay = document.getElementById('upload-overlay');
    const uploadFile = document.getElementById('upload-file');
    const uploadProgress = document.getElementById('upload-progress');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const uploadResult = document.getElementById('upload-result');

    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadOverlay.classList.add('active');
    });

    uploadOverlay.addEventListener('dragleave', (e) => {
      e.preventDefault();
      uploadOverlay.classList.remove('active');
    });

    window.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadOverlay.classList.remove('active');
      if (e.dataTransfer.files.length > 0) {
        stageFile(e.dataTransfer.files[0]);
      }
    });

    uploadFile.addEventListener('change', () => {
      if (uploadFile.files.length > 0) {
        stageFile(uploadFile.files[0]);
      }
    });

    // Pending encryption state for paid video uploads
    let pendingEncryption = null;

    // Staged file waiting for user confirmation
    let stagedFile = null;
    const stagedFileEl = document.getElementById('staged-file');
    const stagedPreview = document.getElementById('staged-preview');
    const stagedFileName = document.getElementById('staged-file-name');
    const stagedFileSize = document.getElementById('staged-file-size');

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function stageFile(file) {
      if (!file.name.toLowerCase().endsWith('.mp4')) {
        showResult('error', 'Only MP4 files are accepted.');
        return;
      }

      // Revoke previous preview URL if any
      if (stagedPreview.src) {
        URL.revokeObjectURL(stagedPreview.src);
      }

      stagedFile = file;
      stagedFileName.textContent = file.name;
      stagedFileSize.textContent = formatFileSize(file.size);
      stagedPreview.src = URL.createObjectURL(file);
      stagedFileEl.classList.add('active');
      uploadResult.style.display = 'none';
      updateUploadButton();
    }

    const uploadActionBtn = document.getElementById('upload-action-btn');

    function updateUploadButton() {
      if (stagedFile) {
        uploadActionBtn.textContent = 'Confirm Upload';
      } else {
        uploadActionBtn.textContent = 'Select MP4';
      }
    }

    window.handleUploadAction = function() {
      if (stagedFile) {
        window.confirmUpload();
      } else {
        document.getElementById('upload-file').click();
      }
    };

    window.cancelStaged = function() {
      stagedFile = null;
      stagedFileEl.classList.remove('active');
      if (stagedPreview.src) {
        URL.revokeObjectURL(stagedPreview.src);
        stagedPreview.removeAttribute('src');
      }
      uploadFile.value = '';
      updateUploadButton();
    };

    window.confirmUpload = async function() {
      if (!stagedFile) return;
      const file = stagedFile;

      // Hide staged preview, show progress
      stagedFileEl.classList.remove('active');
      uploadResult.className = 'upload-result';
      uploadResult.style.display = 'none';
      uploadProgress.style.display = '';
      progressFill.style.width = '0%';
      progressText.textContent = 'Uploading ' + file.name + '...';

      const formData = new FormData();
      formData.append('video', file);
      const title = document.getElementById('video-title').value;
      if (title) {
        formData.append('title', title);
      }
      const priceInput = document.getElementById('video-price').value;
      let priceMist = 0;
      if (priceInput && parseFloat(priceInput) > 0) {
        priceMist = Math.round(parseFloat(priceInput) * 1_000_000_000);
        formData.append('price', priceMist.toString());
      }
      const walletAddr = window.getWalletAddress ? window.getWalletAddress() : null;
      if (walletAddr) {
        formData.append('creator', walletAddr);
      }

      // For paid videos, read file into memory before upload for later Seal encryption
      let fileArrayBuffer = null;
      if (priceMist > 0) {
        fileArrayBuffer = await file.arrayBuffer();
      }

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = 'Uploading ' + file.name + '... ' + pct + '%';
        }
      });

      xhr.addEventListener('load', () => {
        uploadProgress.style.display = 'none';
        if (xhr.status === 202) {
          const data = JSON.parse(xhr.responseText);
          uploadFile.value = '';
          document.getElementById('video-title').value = '';
          document.getElementById('video-price').value = '';

          // For paid videos, store pending encryption info
          if (priceMist > 0 && fileArrayBuffer) {
            pendingEncryption = {
              videoId: data.id,
              fileData: fileArrayBuffer,
              price: priceMist,
            };
          }

          navigate('player', { id: data.id });
        } else {
          let msg = 'Upload failed.';
          try { msg = JSON.parse(xhr.responseText).error || msg; } catch(e) {}
          showResult('error', msg);
        }
      });

      xhr.addEventListener('error', () => {
        uploadProgress.style.display = 'none';
        showResult('error', 'Network error. Is the server running?');
      });

      // Clean up staged state
      stagedFile = null;
      if (stagedPreview.src) {
        URL.revokeObjectURL(stagedPreview.src);
        stagedPreview.removeAttribute('src');
      }
      updateUploadButton();

      xhr.send(formData);
    };

    function showResult(type, message) {
      uploadResult.className = 'upload-result ' + type;
      uploadResult.textContent = message;
      uploadResult.style.display = 'block';
    }

    // Player
    let currentVideo = null;

    // Called by wallet module after connect/reconnect — auto-decrypt if AccessPass exists
    function recheckAccessAfterConnect() {
      if (!currentVideo || currentView !== 'player') return;
      if (currentVideo.price <= 0 || !currentVideo.encrypted || !currentVideo.sui_object_id) return;
      if (!window.isWalletConnected()) return;

      const videoEl = document.getElementById('video-player');
      // Skip if already playing the decrypted full video
      if (videoEl && videoEl.src && videoEl.src.startsWith('blob:')) return;

      const urlEl = document.getElementById('stream-url');
      const paywallEl = document.getElementById('paywall-overlay');
      const hintEl = document.getElementById('paywall-hint');

      window.findAccessPass(currentVideo.sui_object_id).then(function(passId) {
        if (!passId) return;
        if (urlEl) urlEl.textContent = 'Decrypting full video...';
        if (paywallEl) paywallEl.style.display = 'none';
        return window.decryptAndPlay(currentVideo);
      }).then(function() {
        updateChainStatus(currentVideo);
      }).catch(function(err) {
        if (hintEl) hintEl.textContent = 'Decryption failed: ' + err.message;
      });
    }

    function loadPlayer(id) {
      const videoEl = document.getElementById('video-player');
      const videoIdEl = document.getElementById('player-video-id');
      const paywallEl = document.getElementById('paywall-overlay');

      videoIdEl.textContent = id;
      videoEl.removeAttribute('src');
      paywallEl.style.display = 'none';
      currentVideo = null;

      checkAndPlay(id, navGeneration);
    }

    function setupPreviewEndHandler(videoEl, video) {
      videoEl.onended = null;
      if (video.price > 0) {
        videoEl.onended = function() {
          const paywallEl = document.getElementById('paywall-overlay');
          const priceEl = document.getElementById('paywall-price');
          const hintEl = document.getElementById('paywall-hint');
          priceEl.textContent = (video.price / 1_000_000_000).toFixed(2) + ' SUI';
          const btn = document.getElementById('paywall-unlock-btn');
          btn.disabled = false;
          btn.textContent = 'Purchase & Unlock';
          if (!window.isWalletConnected()) {
            hintEl.textContent = 'Connect wallet to purchase';
          } else if (!video.sui_object_id) {
            hintEl.textContent = 'Video not yet published on-chain';
          } else {
            hintEl.textContent = '';
          }
          paywallEl.style.display = 'flex';
        };
      }
    }

    async function startPlayback(video) {
      const videoEl = document.getElementById('video-player');
      const urlEl = document.getElementById('stream-url');

      currentVideo = video;

      // Check if there's a pending encryption for this video (just uploaded paid video)
      if (pendingEncryption && pendingEncryption.videoId === video.id && video.price > 0 && !video.full_blob_id) {
        urlEl.textContent = 'Encrypting and publishing full video...';
        const chainEl = document.getElementById('chain-status');
        if (chainEl) {
          chainEl.style.display = 'block';
          chainEl.innerHTML = '<span style="color:var(--warning);">Encrypting & publishing to Walrus + Sui...</span>';
        }

        // Play preview while encrypting
        videoEl.src = video.preview_blob_url;
        videoEl.play().catch(() => {});

        try {
          if (!window.isWalletConnected()) {
            throw new Error('Wallet must be connected to encrypt paid videos');
          }
          const result = await window.encryptAndPublish(
            pendingEncryption.videoId,
            pendingEncryption.fileData,
            pendingEncryption.price,
            video.preview_blob_id,
          );
          pendingEncryption = null;
          // Refresh video data
          const res = await fetch('/api/status/' + encodeURIComponent(video.id));
          if (res.ok) {
            const updated = await res.json();
            currentVideo = updated;
            updateChainStatus(updated);
            setupPreviewEndHandler(videoEl, updated);
            urlEl.textContent = updated.preview_blob_url;
          }
        } catch (err) {
          pendingEncryption = null;
          if (chainEl) {
            chainEl.innerHTML = '<span style="color:var(--error);">Encryption failed: ' +
              err.message.replace(/</g, '&lt;') + '</span>';
          }
        }
        return;
      }

      // Free videos: play full directly
      if (video.price === 0 && video.full_blob_url) {
        urlEl.textContent = video.full_blob_url;
        videoEl.src = video.full_blob_url;
        videoEl.play().catch(() => {});
        updateChainStatus(video);
        return;
      }

      // Paid video with AccessPass: auto-decrypt
      if (video.price > 0 && video.encrypted && video.sui_object_id && window.isWalletConnected()) {
        try {
          const passId = await window.findAccessPass(video.sui_object_id);
          if (passId) {
            urlEl.textContent = 'Decrypting full video...';
            await window.decryptAndPlay(video);
            updateChainStatus(video);
            return;
          }
        } catch (err) {
          // Show error but fall through to preview playback
          const hintEl = document.getElementById('paywall-hint');
          if (hintEl) hintEl.textContent = 'Auto-decrypt failed: ' + err.message;
        }
      }

      // Default: play preview, show paywall on end
      urlEl.textContent = video.preview_blob_url;
      videoEl.src = video.preview_blob_url;
      setupPreviewEndHandler(videoEl, video);
      videoEl.play().catch(() => {});

      updateChainStatus(video);
    }

    function updateChainStatus(video) {
      const chainEl = document.getElementById('chain-status');
      if (!chainEl) return;

      if (video.sui_object_id) {
        let statusHtml = '<span style="color:var(--success);">On-chain</span> <span style="font-family:monospace; color:var(--text-muted); font-size:0.75rem;">' +
          video.sui_object_id.slice(0, 10) + '...' + video.sui_object_id.slice(-4) + '</span>';
        if (video.encrypted) {
          statusHtml += ' <span style="color:var(--accent); font-size:0.75rem;">Seal encrypted</span>';
        }
        chainEl.style.display = 'block';
        chainEl.innerHTML = statusHtml;
        return;
      }

      // Paid videos without sui_object_id: encryption pending (auto-published during encrypt flow)
      if (video.price > 0 && !video.full_blob_id) {
        chainEl.style.display = 'block';
        chainEl.innerHTML = '<span style="color:var(--warning);">Awaiting Seal encryption & on-chain publish</span>';
      } else if (video.price > 0) {
        chainEl.style.display = 'block';
        chainEl.innerHTML = '<span style="color:var(--text-muted);">Connect wallet to publish on-chain</span>';
      } else {
        chainEl.style.display = 'none';
      }
    }

    // publishToChain removed — paid videos auto-publish during encrypt flow

    async function purchaseAndPlay() {
      if (!currentVideo) return;
      const btn = document.getElementById('paywall-unlock-btn');
      const hintEl = document.getElementById('paywall-hint');
      const paywallEl = document.getElementById('paywall-overlay');

      if (!window.isWalletConnected()) {
        window.walletConnect();
        return;
      }

      if (!currentVideo.sui_object_id) {
        if (hintEl) hintEl.textContent = 'Video not published on-chain yet';
        return;
      }

      btn.disabled = true;
      if (hintEl) hintEl.textContent = '';

      try {
        // Check if user already owns an AccessPass (e.g. purchased before refresh)
        btn.textContent = 'Checking access...';
        const existingPass = await window.findAccessPass(currentVideo.sui_object_id);

        if (!existingPass) {
          btn.textContent = 'Purchasing...';
          await window.purchaseVideo(currentVideo);
        }

        btn.textContent = 'Decrypting...';
        await window.decryptAndPlay(currentVideo);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Purchase & Unlock';
        if (hintEl) hintEl.textContent = 'Failed: ' + err.message;
      }
    }

    async function checkAndPlay(id, generation) {
      const statusEl = document.getElementById('player-status');
      const urlEl = document.getElementById('stream-url');
      const titleEl = document.getElementById('player-video-title');

      if (generation !== navGeneration) return;

      try {
        const res = await fetch('/api/status/' + encodeURIComponent(id));

        if (generation !== navGeneration) return;

        if (!res.ok) {
          statusEl.textContent = 'not found';
          statusEl.className = 'status-badge failed';
          return;
        }
        const video = await res.json();
        titleEl.textContent = video.title || video.id;
        const safeStatus = ['ready', 'processing', 'failed'].includes(video.status) ? video.status : 'failed';
        statusEl.textContent = video.status;
        statusEl.className = 'status-badge ' + safeStatus;

        if (video.status === 'ready') {
          startPlayback(video);
        } else if (video.status === 'processing') {
          urlEl.textContent = 'Uploading to Walrus... will auto-play when ready.';
          pollInterval = setInterval(async () => {
            if (generation !== navGeneration) {
              clearInterval(pollInterval);
              pollInterval = null;
              return;
            }
            const r = await fetch('/api/status/' + encodeURIComponent(id));
            if (generation !== navGeneration) {
              clearInterval(pollInterval);
              pollInterval = null;
              return;
            }
            if (r.ok) {
              const v = await r.json();
              titleEl.textContent = v.title || v.id;
              const ss = ['ready', 'processing', 'failed'].includes(v.status) ? v.status : 'failed';
              statusEl.textContent = v.status;
              statusEl.className = 'status-badge ' + ss;
              if (v.status === 'ready') {
                clearInterval(pollInterval);
                pollInterval = null;
                startPlayback(v);
              } else if (v.status === 'failed') {
                clearInterval(pollInterval);
                pollInterval = null;
                urlEl.textContent = 'Upload failed: ' + (v.error || 'unknown error');
              }
            }
          }, 2000);
        } else {
          urlEl.textContent = 'Upload failed: ' + (video.error || 'unknown error');
        }
      } catch (err) {
        if (generation !== navGeneration) return;
        statusEl.textContent = 'error';
        statusEl.className = 'status-badge failed';
        urlEl.textContent = 'Cannot connect to server.';
      }
    }

    function copyStreamUrl() {
      const url = document.getElementById('stream-url').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.player-actions .btn-outline');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy URL'; }, 1500);
      });
    }

    function deleteFromPlayer() {
      const id = document.getElementById('player-video-id').textContent;
      if (!id) return;
      deleteVideo(id);
    }

    // Utilities
    function formatDate(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Router
    function handleRoute() {
      const path = window.location.pathname;
      if (path === '/') {
        navigate('videos', null, false);
      } else if (path.startsWith('/play/')) {
        const id = path.slice(6);
        navigate('player', { id: id }, false);
      } else {
        navigate('videos', null, false);
      }
    }

    window.addEventListener('popstate', handleRoute);
    handleRoute();
  </script>
</body>
</html>
