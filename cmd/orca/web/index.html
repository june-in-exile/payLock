<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orca - Video Streaming</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-hover: #1f1f1f;
      --border: #222222;
      --text: #ffffff;
      --text-muted: #888888;
      --accent: #3898ff;
      --accent-hover: #217ff0;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, Helvetica, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo-text { color: #fff; }

    .logo-box {
      background: var(--accent);
      color: #000;
      padding: 0.1rem 0.4rem;
      border-radius: 6px;
      margin-left: 3px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem;
    }

    .view { display: none; }
    .view.active { display: block; }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    /* Upload Overlay */
    .upload-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 17, 23, 0.8);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border: 3px dashed var(--accent);
      margin: 1rem;
      border-radius: 20px;
      pointer-events: none;
    }

    .upload-overlay.active {
      display: flex;
    }

    .upload-overlay-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* Video list */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem 1rem;
    }

    .video-card {
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: visible;
    }

    .video-card:hover .video-thumb {
      border-color: var(--accent);
    }

    .video-thumb {
      aspect-ratio: 16/9;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
      transition: border-color 0.2s;
      border: 1px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    .video-info {
      padding: 0.25rem 0;
    }

    .video-info .video-id {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.25rem;
      transition: color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-info .video-id:hover {
      color: var(--accent);
    }

    .video-info .video-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      align-items: center;
    }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-badge.ready { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .status-badge.processing { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .status-badge.failed { background: rgba(239, 68, 68, 0.15); color: var(--error); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state p {
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.25rem;
      background: #151515;
      color: #ffffff;
      border: 2px solid var(--accent);
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #222222;
      border-color: var(--accent-hover);
    }

    .btn-sm {
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
      border-width: 2px;
    }

    .btn-outline {
      background: #151515;
      border: 2px solid #444444;
      color: #ffffff;
    }

    .btn-outline:hover {
      border-color: #666666;
      background: #222222;
    }

    .btn-danger {
      background: #151515;
      border: 2px solid #552222;
      color: #ff5555;
    }

    .btn-danger:hover {
      background: #221111;
      border-color: #ff3333;
      color: #ffffff;
    }

    .video-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 0;
      margin-top: 0.25rem;
      border-top: none;
    }

    /* Player */
    .player-container {
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .player-container video {
      width: 100%;
      display: block;
    }

    .player-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .player-info .video-id {
      font-family: monospace;
      font-size: 1rem;
    }

    .player-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .stream-url {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .back-link {
      display: inline-block;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .back-link:hover { color: var(--text); }

    .price-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: monospace;
    }

    .price-badge.paid { background: rgba(56, 152, 255, 0.15); color: var(--accent); }
    .price-badge.free { background: rgba(255, 255, 255, 0.08); color: var(--text-muted); }

    .paywall-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 10;
    }

    .paywall-overlay .paywall-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .paywall-overlay .paywall-label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* Wallet */
    .wallet-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .wallet-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .wallet-btn.connect {
      background: #151515;
      border: 2px solid var(--accent);
      color: #ffffff;
    }

    .wallet-btn.connect:hover {
      background: #222222;
      border-color: var(--accent-hover);
    }

    .wallet-btn.connected {
      background: #111111;
      border: 2px solid #333333;
      color: #aaaaaa;
      position: relative;
    }

    .wallet-btn.connected:hover {
      background: #151515;
      border-color: #555555;
      color: #ffffff;
    }

    .wallet-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .wallet-balance {
      font-family: monospace;
      color: var(--text);
      font-weight: 500;
    }

    .wallet-addr {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .wallet-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
    }

  </style>
</head>
<body>
  <header>
    <div class="logo" onclick="navigate('videos')"><span class="logo-text">Or</span><span class="logo-box">ca</span></div>
    <div class="wallet-area">
      <div id="wallet-status" class="wallet-info" style="display:none;">
        <span class="wallet-dot"></span>
        <span class="wallet-balance" id="wallet-balance">0 SUI</span>
        <span class="wallet-addr" id="wallet-addr"></span>
      </div>
      <button class="wallet-btn connect" id="wallet-btn" onclick="window.walletConnect()">
        Connect Wallet
      </button>
    </div>
  </header>

  <div class="upload-overlay" id="upload-overlay">
    <div class="upload-overlay-text">Drop MP4 to upload</div>
  </div>

  <main>
    <!-- Videos list view -->
    <div id="view-videos" class="view active">
      <div class="upload-progress" id="upload-progress" style="display:none;">
        <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">Uploading...</div>
      </div>
      <div class="upload-result" id="upload-result"></div>

      <div style="margin-bottom: 1.5rem; padding: 1.25rem; background: var(--surface); border-radius: 8px;">
        <label for="video-title" style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Video Title (optional)</label>
        <input type="text" id="video-title" placeholder="Enter video title" style="width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; margin-bottom: 0.75rem;">

        <label for="video-price" style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Price in SUI (0 = free)</label>
        <input type="number" id="video-price" placeholder="0" min="0" step="0.01" style="width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; margin-bottom: 1rem;">

        <div style="display:flex; align-items:center; justify-content:space-between;">
          <h2 style="margin-bottom:0;">Videos</h2>
          <div style="display:flex; gap:0.75rem; align-items:center;">
            <button class="refresh-btn" onclick="loadVideos()">Refresh</button>
            <button class="btn" onclick="document.getElementById('upload-file').click()" title="Upload Video">Upload MP4</button>
            <input type="file" id="upload-file" accept="video/mp4,.mp4" style="display:none;">
          </div>
        </div>
      </div>
      <div id="video-list"></div>
    </div>

    <!-- Player view -->
    <div id="view-player" class="view">
      <a class="back-link" onclick="navigate('videos')">&larr; Back to videos</a>
      <div class="player-info">
        <div style="display:flex; flex-direction:column;">
          <span class="video-title" id="player-video-title" style="font-size:1.25rem; font-weight:600; margin-bottom:0.25rem;"></span>
          <span class="video-id" id="player-video-id" style="font-size:0.8rem; color:var(--text-muted); font-family:monospace;"></span>
        </div>
        <span class="status-badge" id="player-status"></span>
      </div>
      <div class="player-container" style="position: relative;">
        <video id="video-player" controls></video>
        <div class="paywall-overlay" id="paywall-overlay" style="display: none;">
          <div class="paywall-label">Preview ended</div>
          <div class="paywall-price" id="paywall-price"></div>
          <button class="btn" id="paywall-unlock-btn" onclick="playFull()">Play Full Video</button>
          <div class="paywall-label" style="font-size: 0.75rem; margin-top: 0.5rem;">In Phase 2, this will require payment via Seal</div>
        </div>
        <div id="chain-status" style="display:none; margin-top: 0.75rem; padding: 0.75rem 1rem; background: var(--surface); border-radius: 8px; font-size: 0.85rem;">
        </div>
      </div>
      <div class="stream-url" id="stream-url"></div>
      <div class="player-actions">
        <button class="btn btn-sm btn-outline" onclick="copyStreamUrl()">Copy URL</button>
        <button class="btn btn-sm btn-danger" id="player-delete-btn" onclick="deleteFromPlayer()">Delete</button>
      </div>
    </div>
  </main>

  <script type="module">
    // --- Slush Wallet Integration ---
    const SUI_NETWORK = 'sui:testnet';

    let connectedWallet = null;
    let connectedAccount = null;
    let suiClient = null;
    let discoveredWallets = [];
    let unsubscribeWalletEvents = null;
    let Transaction = null;
    let signAndExecuteTransaction = null;
    let paywallPackageId = null;

    function findSlushWallet() {
      return discoveredWallets.find(w => w.name.toLowerCase().includes('slush'));
    }

    async function fetchAppConfig() {
      try {
        const res = await fetch('/api/config');
        if (res.ok) {
          const cfg = await res.json();
          paywallPackageId = cfg.paywall_package_id || null;
        }
      } catch (_) {}
    }

    async function initWallet() {
      try {
        const [slushMod, walletMod, suiMod, txMod, walletStdMod, configResult] = await Promise.all([
          import('https://esm.sh/@mysten/slush-wallet@1.0.3?bundle'),
          import('https://esm.sh/@wallet-standard/app@1.1.0?bundle'),
          import('https://esm.sh/@mysten/sui@1.21.1/client?bundle'),
          import('https://esm.sh/@mysten/sui@1.21.1/transactions?bundle'),
          import('https://esm.sh/@mysten/wallet-standard@0.13.9?bundle'),
          fetchAppConfig(),
        ]);

        const { registerSlushWallet } = slushMod;
        const { getWallets } = walletMod;
        const { SuiClient, getFullnodeUrl } = suiMod;
        Transaction = txMod.Transaction;
        signAndExecuteTransaction = walletStdMod.signAndExecuteTransaction;

        suiClient = new SuiClient({ url: getFullnodeUrl('testnet') });
        window._walletStandard = { getWallets, SuiClient, getFullnodeUrl, suiClient };

        const { get, on } = getWallets();
        discoveredWallets = [...get()];

        const unsubRegister = on('register', (...newWallets) => {
          for (const w of newWallets) {
            if (!discoveredWallets.some(existing => existing.name === w.name)) {
              discoveredWallets.push(w);
            }
          }
          const savedAddr = sessionStorage.getItem('orca_wallet_addr');
          if (savedAddr && !connectedWallet && findSlushWallet()) {
            autoReconnect();
          }
        });

        const unsubUnregister = on('unregister', (...removed) => {
          for (const w of removed) {
            discoveredWallets = discoveredWallets.filter(existing => existing.name !== w.name);
          }
        });

        unsubscribeWalletEvents = () => { unsubRegister(); unsubUnregister(); };

        registerSlushWallet('Orca Video Streaming', {
          origin: 'https://slush.app',
        });

        const savedAddr = sessionStorage.getItem('orca_wallet_addr');
        if (savedAddr && findSlushWallet()) {
          await autoReconnect();
        }
      } catch (err) {
        const btn = document.getElementById('wallet-btn');
        btn.textContent = 'Wallet Unavailable';
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
      }
    }

    async function autoReconnect() {
      try {
        const slush = findSlushWallet();
        if (!slush) return;
        const connectFeature = slush.features['standard:connect'];
        const result = await connectFeature.connect({ silent: true });
        if (result.accounts && result.accounts.length > 0) {
          connectedWallet = slush;
          connectedAccount = result.accounts[0];
          await updateWalletUI();
        }
      } catch (_) {
        sessionStorage.removeItem('orca_wallet_addr');
      }
    }

    async function connectWallet() {
      if (connectedWallet) {
        await disconnectWallet();
        return;
      }

      try {
        const slush = findSlushWallet();
        if (!slush) {
          window.open('https://slush.app', '_blank');
          return;
        }

        const connectFeature = slush.features['standard:connect'];
        const result = await connectFeature.connect();

        if (result.accounts.length > 0) {
          connectedWallet = slush;
          connectedAccount = result.accounts[0];
          sessionStorage.setItem('orca_wallet_addr', connectedAccount.address);
          await updateWalletUI();
        }
      } catch (err) {
        const btn = document.getElementById('wallet-btn');
        btn.textContent = 'Connection Failed';
        setTimeout(() => { btn.textContent = 'Connect Wallet'; }, 2000);
      }
    }

    async function disconnectWallet() {
      if (connectedWallet) {
        try {
          const disconnectFeature = connectedWallet.features['standard:disconnect'];
          if (disconnectFeature) {
            await disconnectFeature.disconnect();
          }
        } catch (_) {}
      }
      connectedWallet = null;
      connectedAccount = null;
      sessionStorage.removeItem('orca_wallet_addr');

      const btn = document.getElementById('wallet-btn');
      btn.textContent = 'Connect Wallet';
      btn.className = 'wallet-btn connect';
      document.getElementById('wallet-status').style.display = 'none';
    }

    async function updateWalletUI() {
      const btn = document.getElementById('wallet-btn');
      const statusEl = document.getElementById('wallet-status');
      const balanceEl = document.getElementById('wallet-balance');
      const addrEl = document.getElementById('wallet-addr');

      if (!connectedAccount) return;

      const addr = connectedAccount.address;
      const shortAddr = addr.slice(0, 6) + '...' + addr.slice(-4);

      btn.textContent = 'Disconnect';
      btn.className = 'wallet-btn connected';

      addrEl.textContent = shortAddr;
      statusEl.style.display = 'flex';

      try {
        const balance = await suiClient.getBalance({ owner: addr });
        const suiAmount = (Number(balance.totalBalance) / 1_000_000_000).toFixed(4);
        balanceEl.textContent = suiAmount + ' SUI';
      } catch (_) {
        balanceEl.textContent = '-- SUI';
      }
    }

    async function createVideoOnChain(videoId, price, previewBlobId, fullBlobId) {
      if (!connectedWallet || !connectedAccount) {
        throw new Error('Wallet not connected');
      }
      if (!paywallPackageId) {
        throw new Error('Paywall contract not configured');
      }
      if (!Transaction || !signAndExecuteTransaction) {
        throw new Error('Sui SDK not loaded');
      }

      if (!/^0x[0-9a-fA-F]{64}$/.test(paywallPackageId)) {
        throw new Error('Invalid paywall package ID format');
      }

      const tx = new Transaction();
      tx.moveCall({
        target: paywallPackageId + '::paywall::create_video',
        arguments: [
          tx.pure.u64(price),
          tx.pure.string(previewBlobId),
          tx.pure.string(fullBlobId),
        ],
      });

      const result = await signAndExecuteTransaction(connectedWallet, {
        transaction: tx,
        account: connectedAccount,
        chain: SUI_NETWORK,
      });

      const txResponse = await suiClient.waitForTransaction({
        digest: result.digest,
        options: { showObjectChanges: true },
      });

      const videoType = paywallPackageId + '::paywall::Video';
      const created = (txResponse.objectChanges || []).find(
        c => c.type === 'created' && c.objectType === videoType
      );

      if (!created) {
        throw new Error('Video object not found in transaction result');
      }

      const suiObjectId = created.objectId;

      const res = await fetch('/api/videos/' + encodeURIComponent(videoId) + '/sui-object', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sui_object_id: suiObjectId }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error('Failed to save Sui object ID: ' + (body.error || res.status));
      }

      return suiObjectId;
    }

    window.walletConnect = connectWallet;
    window.isWalletConnected = () => !!connectedAccount;
    window.getWalletAddress = () => connectedAccount ? connectedAccount.address : null;
    window.createVideoOnChain = createVideoOnChain;
    window.getPaywallPackageId = () => paywallPackageId;

    initWallet();
  </script>
  <script>
    // State
    let currentView = 'videos';
    let pollInterval = null;
    let navGeneration = 0;

    // Navigation
    function navigate(view, params, push = true) {
      navGeneration++;
      currentView = view;

      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }

      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const viewEl = document.getElementById('view-' + view);
      if (viewEl) viewEl.classList.add('active');

      if (view === 'videos') {
        loadVideos();
        if (push) history.pushState({view}, '', '/');
      } else if (view === 'player' && params && params.id) {
        if (push) history.pushState({view, id: params.id}, '', '/play/' + params.id);
        loadPlayer(params.id);
      }
    }

    // Video list
    function createVideoCard(v) {
      const card = document.createElement('div');
      card.className = 'video-card';

      const thumb = document.createElement('div');
      thumb.className = 'video-thumb';
      thumb.textContent = v.status === 'ready' ? '\u25B6' : '\u2026';
      thumb.addEventListener('click', () => navigate('player', { id: v.id }));
      thumb.style.cursor = 'pointer';
      card.appendChild(thumb);

      const info = document.createElement('div');
      info.className = 'video-info';

      const titleEl = document.createElement('div');
      titleEl.className = 'video-id';
      titleEl.textContent = v.title || v.id;
      titleEl.style.cursor = 'pointer';
      titleEl.addEventListener('click', () => navigate('player', { id: v.id }));
      info.appendChild(titleEl);

      const meta = document.createElement('div');
      meta.className = 'video-meta';

      const idEl = document.createElement('span');
      idEl.textContent = 'ID: ' + v.id.slice(0, 8);
      idEl.style.fontFamily = 'monospace';
      meta.appendChild(idEl);

      const statusBadge = document.createElement('span');
      const safeStatus = ['ready', 'processing', 'failed'].includes(v.status) ? v.status : 'failed';
      statusBadge.className = 'status-badge ' + safeStatus;
      statusBadge.textContent = v.status;
      meta.appendChild(statusBadge);

      const priceBadge = document.createElement('span');
      if (v.price > 0) {
        priceBadge.className = 'price-badge paid';
        priceBadge.textContent = (v.price / 1_000_000_000).toFixed(2) + ' SUI';
      } else {
        priceBadge.className = 'price-badge free';
        priceBadge.textContent = 'Free';
      }
      meta.appendChild(priceBadge);

      const dateEl = document.createElement('span');
      dateEl.textContent = formatDate(v.created_at);
      meta.appendChild(dateEl);

      info.appendChild(meta);
      card.appendChild(info);

      const actions = document.createElement('div');
      actions.className = 'video-actions';

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn btn-sm btn-danger';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteVideo(v.id);
      });
      actions.appendChild(deleteBtn);

      card.appendChild(actions);

      return card;
    }

    function setEmptyState(container, message) {
      container.textContent = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'empty-state';
      const p = document.createElement('p');
      p.textContent = message;
      wrapper.appendChild(p);
      container.appendChild(wrapper);
    }

    async function deleteVideo(id) {
      if (!confirm('Are you sure you want to delete this video? This action cannot be undone.')) {
        return;
      }
      try {
        const res = await fetch('/api/videos/' + encodeURIComponent(id), {
          method: 'DELETE',
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || 'Failed to delete video.');
          return;
        }
        navigate('videos');
      } catch (err) {
        alert('Failed to delete video: ' + err.message);
      }
    }

    async function loadVideos() {
      const container = document.getElementById('video-list');
      try {
        const res = await fetch('/api/videos');
        if (!res.ok) {
          setEmptyState(container, 'Failed to load videos.');
          return;
        }
        const data = await res.json();
        const videos = data.videos || [];

        if (videos.length === 0) {
          setEmptyState(container, 'No videos yet. Drag and drop a file or click Upload MP4.');
          return;
        }

        container.textContent = '';
        const grid = document.createElement('div');
        grid.className = 'video-grid';
        videos.forEach(v => grid.appendChild(createVideoCard(v)));
        container.appendChild(grid);
      } catch (err) {
        setEmptyState(container, 'Cannot connect to server.');
      }
    }

    // Upload
    const uploadOverlay = document.getElementById('upload-overlay');
    const uploadFile = document.getElementById('upload-file');
    const uploadProgress = document.getElementById('upload-progress');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const uploadResult = document.getElementById('upload-result');

    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadOverlay.classList.add('active');
    });

    uploadOverlay.addEventListener('dragleave', (e) => {
      e.preventDefault();
      uploadOverlay.classList.remove('active');
    });

    window.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadOverlay.classList.remove('active');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    uploadFile.addEventListener('change', () => {
      if (uploadFile.files.length > 0) {
        handleFile(uploadFile.files[0]);
      }
    });

    function handleFile(file) {
      if (!file.name.toLowerCase().endsWith('.mp4')) {
        showResult('error', 'Only MP4 files are accepted.');
        return;
      }

      uploadResult.className = 'upload-result';
      uploadResult.style.display = 'none';
      uploadProgress.style.display = '';
      progressFill.style.width = '0%';
      progressText.textContent = 'Uploading ' + file.name + '...';

      const formData = new FormData();
      formData.append('video', file);
      const title = document.getElementById('video-title').value;
      if (title) {
        formData.append('title', title);
      }
      const priceInput = document.getElementById('video-price').value;
      if (priceInput && parseFloat(priceInput) > 0) {
        const priceMist = Math.round(parseFloat(priceInput) * 1_000_000_000);
        formData.append('price', priceMist.toString());
      }
      const walletAddr = window.getWalletAddress ? window.getWalletAddress() : null;
      if (walletAddr) {
        formData.append('creator', walletAddr);
      }

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = 'Uploading ' + file.name + '... ' + pct + '%';
        }
      });

      xhr.addEventListener('load', () => {
        uploadProgress.style.display = 'none';
        if (xhr.status === 202) {
          const data = JSON.parse(xhr.responseText);
          uploadFile.value = '';
          document.getElementById('video-title').value = '';
          document.getElementById('video-price').value = '';
          navigate('player', { id: data.id });
        } else {
          let msg = 'Upload failed.';
          try { msg = JSON.parse(xhr.responseText).error || msg; } catch(e) {}
          showResult('error', msg);
        }
      });

      xhr.addEventListener('error', () => {
        uploadProgress.style.display = 'none';
        showResult('error', 'Network error. Is the server running?');
      });

      xhr.send(formData);
    }

    function showResult(type, message) {
      uploadResult.className = 'upload-result ' + type;
      uploadResult.textContent = message;
      uploadResult.style.display = 'block';
    }

    // Player
    let currentVideo = null;

    function loadPlayer(id) {
      const videoEl = document.getElementById('video-player');
      const videoIdEl = document.getElementById('player-video-id');
      const paywallEl = document.getElementById('paywall-overlay');

      videoIdEl.textContent = id;
      videoEl.removeAttribute('src');
      paywallEl.style.display = 'none';
      currentVideo = null;

      checkAndPlay(id, navGeneration);
    }

    function setupPreviewEndHandler(videoEl, video) {
      videoEl.onended = null;
      if (video.price > 0 && video.preview_blob_url !== video.full_blob_url) {
        videoEl.onended = function() {
          const paywallEl = document.getElementById('paywall-overlay');
          const priceEl = document.getElementById('paywall-price');
          priceEl.textContent = (video.price / 1_000_000_000).toFixed(2) + ' SUI';
          paywallEl.style.display = 'flex';
        };
      }
    }

    function startPlayback(video) {
      const videoEl = document.getElementById('video-player');
      const urlEl = document.getElementById('stream-url');

      currentVideo = video;

      if (video.price === 0 && video.full_blob_url) {
        urlEl.textContent = video.full_blob_url;
        videoEl.src = video.full_blob_url;
      } else {
        urlEl.textContent = video.preview_blob_url;
        videoEl.src = video.preview_blob_url;
        setupPreviewEndHandler(videoEl, video);
      }
      videoEl.play().catch(() => {});

      updateChainStatus(video);
    }

    function updateChainStatus(video) {
      const chainEl = document.getElementById('chain-status');
      if (!chainEl) return;

      if (video.sui_object_id) {
        chainEl.style.display = 'block';
        chainEl.innerHTML = '<span style="color:var(--success);">On-chain</span> <span style="font-family:monospace; color:var(--text-muted); font-size:0.75rem;">' +
          video.sui_object_id.slice(0, 10) + '...' + video.sui_object_id.slice(-4) + '</span>';
        return;
      }

      if (video.price > 0 && window.isWalletConnected() && window.getPaywallPackageId()) {
        chainEl.style.display = 'block';
        chainEl.innerHTML = '<button class="btn btn-sm" id="publish-chain-btn" onclick="publishToChain()">Publish to Sui</button>' +
          ' <span style="color:var(--text-muted); font-size:0.8rem;">Create on-chain Video object for paywall</span>';
      } else if (video.price > 0 && !video.sui_object_id) {
        chainEl.style.display = 'block';
        if (!window.getPaywallPackageId || !window.getPaywallPackageId()) {
          chainEl.innerHTML = '<span style="color:var(--text-muted);">Contract not configured (set ORCA_PAYWALL_PACKAGE_ID)</span>';
        } else {
          chainEl.innerHTML = '<span style="color:var(--text-muted);">Connect wallet to publish on-chain</span>';
        }
      } else {
        chainEl.style.display = 'none';
      }
    }

    async function publishToChain() {
      if (!currentVideo) return;
      const chainEl = document.getElementById('chain-status');
      const btn = document.getElementById('publish-chain-btn');

      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Signing...';
      }

      try {
        const suiObjectId = await window.createVideoOnChain(
          currentVideo.id,
          currentVideo.price,
          currentVideo.preview_blob_id,
          currentVideo.full_blob_id
        );
        currentVideo.sui_object_id = suiObjectId;
        updateChainStatus(currentVideo);
      } catch (err) {
        chainEl.textContent = '';
        const errSpan = document.createElement('span');
        errSpan.style.color = 'var(--error)';
        errSpan.textContent = 'Failed: ' + err.message;
        chainEl.appendChild(errSpan);
        const retryBtn = document.createElement('button');
        retryBtn.className = 'btn btn-sm';
        retryBtn.style.marginLeft = '0.5rem';
        retryBtn.textContent = 'Retry';
        retryBtn.addEventListener('click', publishToChain);
        chainEl.appendChild(retryBtn);
      }
    }

    function playFull() {
      if (!currentVideo) return;
      const videoEl = document.getElementById('video-player');
      const urlEl = document.getElementById('stream-url');
      const paywallEl = document.getElementById('paywall-overlay');

      paywallEl.style.display = 'none';
      videoEl.onended = null;
      urlEl.textContent = currentVideo.full_blob_url;
      videoEl.src = currentVideo.full_blob_url;
      videoEl.play().catch(() => {});
    }

    async function checkAndPlay(id, generation) {
      const statusEl = document.getElementById('player-status');
      const urlEl = document.getElementById('stream-url');
      const titleEl = document.getElementById('player-video-title');

      if (generation !== navGeneration) return;

      try {
        const res = await fetch('/api/status/' + encodeURIComponent(id));

        if (generation !== navGeneration) return;

        if (!res.ok) {
          statusEl.textContent = 'not found';
          statusEl.className = 'status-badge failed';
          return;
        }
        const video = await res.json();
        titleEl.textContent = video.title || video.id;
        const safeStatus = ['ready', 'processing', 'failed'].includes(video.status) ? video.status : 'failed';
        statusEl.textContent = video.status;
        statusEl.className = 'status-badge ' + safeStatus;

        if (video.status === 'ready') {
          startPlayback(video);
        } else if (video.status === 'processing') {
          urlEl.textContent = 'Uploading to Walrus... will auto-play when ready.';
          pollInterval = setInterval(async () => {
            if (generation !== navGeneration) {
              clearInterval(pollInterval);
              pollInterval = null;
              return;
            }
            const r = await fetch('/api/status/' + encodeURIComponent(id));
            if (generation !== navGeneration) {
              clearInterval(pollInterval);
              pollInterval = null;
              return;
            }
            if (r.ok) {
              const v = await r.json();
              titleEl.textContent = v.title || v.id;
              const ss = ['ready', 'processing', 'failed'].includes(v.status) ? v.status : 'failed';
              statusEl.textContent = v.status;
              statusEl.className = 'status-badge ' + ss;
              if (v.status === 'ready') {
                clearInterval(pollInterval);
                pollInterval = null;
                startPlayback(v);
              } else if (v.status === 'failed') {
                clearInterval(pollInterval);
                pollInterval = null;
                urlEl.textContent = 'Upload failed: ' + (v.error || 'unknown error');
              }
            }
          }, 2000);
        } else {
          urlEl.textContent = 'Upload failed: ' + (video.error || 'unknown error');
        }
      } catch (err) {
        if (generation !== navGeneration) return;
        statusEl.textContent = 'error';
        statusEl.className = 'status-badge failed';
        urlEl.textContent = 'Cannot connect to server.';
      }
    }

    function copyStreamUrl() {
      const url = document.getElementById('stream-url').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.player-actions .btn-outline');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy URL'; }, 1500);
      });
    }

    function deleteFromPlayer() {
      const id = document.getElementById('player-video-id').textContent;
      if (!id) return;
      deleteVideo(id);
    }

    // Utilities
    function formatDate(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Router
    function handleRoute() {
      const path = window.location.pathname;
      if (path === '/') {
        navigate('videos', null, false);
      } else if (path.startsWith('/play/')) {
        const id = path.slice(6);
        navigate('player', { id: id }, false);
      } else {
        navigate('videos', null, false);
      }
    }

    window.addEventListener('popstate', handleRoute);
    handleRoute();
  </script>
</body>
</html>
